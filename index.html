<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oropella — Catálogo de Joyería</title>
<meta name="description" content="Descubrí la colección de joyería Oropella. Aretes, pulseras, cadenas, anillos y dijes. Pedidos por WhatsApp.">
<meta name="theme-color" content="#C9A84C">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold-light: #E8D5A0; --gold-dark: #8B6914;
    --hero-bg: #ECE1CF; --cream: #FAF8F4; --warm-white: #F5F2EE;
    --charcoal: #1C1A17; --text-light: #9C9088;
    --border: rgba(201,168,76,0.2); --card-bg: #FFFEFB;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--cream); color: var(--charcoal); font-family: 'Montserrat', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }

  /* HERO */
  .hero { background: var(--hero-bg); padding: 44px 24px 36px; text-align: center; position: relative; }
  .hero::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  .hero-logo-img { width: clamp(180px,55vw,300px); height:auto; display:block; margin:0 auto 16px; }
  .hero-tagline { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(12px,3vw,14px); color:var(--gold-dark); letter-spacing:0.12em; margin-bottom:24px; opacity:0.75; }
  .hero-divider { width:40px; height:1px; background:var(--gold); margin:0 auto 24px; opacity:0.5; }
  .whatsapp-btn { display:inline-flex; align-items:center; gap:8px; background:var(--charcoal); border:1px solid var(--charcoal); color:#fff; font-family:'Montserrat',sans-serif; font-size:10px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; padding:12px 28px; text-decoration:none; transition:all 0.3s ease; }
  .whatsapp-btn:hover { background:var(--gold); border-color:var(--gold); color:var(--charcoal); }
  .whatsapp-btn svg { width:15px; height:15px; flex-shrink:0; }

  /* FILTERS */
  .filters-wrap { background:var(--warm-white); border-bottom:1px solid var(--border); padding:0 16px; position:sticky; top:0; z-index:100; box-shadow:0 1px 8px rgba(0,0,0,0.04); }
  .filters { display:flex; overflow-x:auto; scrollbar-width:none; max-width:700px; margin:0 auto; }
  .filters::-webkit-scrollbar { display:none; }
  .filter-btn { background:none; border:none; border-bottom:2px solid transparent; color:var(--text-light); font-family:'Montserrat',sans-serif; font-size:10px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; padding:15px 18px; cursor:pointer; white-space:nowrap; transition:all 0.2s ease; flex-shrink:0; }
  .filter-btn:hover { color:var(--gold-dark); }
  .filter-btn.active { color:var(--gold-dark); border-bottom-color:var(--gold); }
  .filter-count { display:inline-block; margin-left:5px; font-size:8px; opacity:0.6; font-weight:400; letter-spacing:0; }

  /* GRID */
  .grid-wrap { max-width:720px; margin:0 auto; padding:28px 14px 96px; }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  @media(min-width:480px){ .grid{ grid-template-columns:repeat(3,1fr); } }

  /* CARD */
  .card { background:var(--card-bg); border:1px solid var(--border); transition:transform 0.25s ease,box-shadow 0.25s ease; overflow:hidden; position:relative; }
  .card:not(.agotado):hover { transform:translateY(-3px); box-shadow:0 10px 36px rgba(0,0,0,0.08); }
  .card.agotado { opacity:0.85; }
  .card-img-wrap { aspect-ratio:1; overflow:hidden; background:#F0EDE8; cursor:pointer; position:relative; }
  .card.agotado .card-img-wrap { cursor:pointer; }
  .card-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s ease; display:block; }
  .card:not(.agotado):hover .card-img-wrap img { transform:scale(1.04); }
  .card-zoom-hint { position:absolute; bottom:8px; right:8px; background:rgba(28,26,23,0.55); border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; pointer-events:none; }
  .card:not(.agotado):hover .card-zoom-hint { opacity:1; }
  .card-zoom-hint svg { width:14px; height:14px; color:#fff; }
  /* Badge agotado */
  .badge-agotado { position:absolute; top:10px; left:10px; background:rgba(28,26,23,0.75); color:#fff; font-family:'Montserrat',sans-serif; font-size:8px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; padding:4px 8px; }
  .no-img { width:100%; height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; color:var(--text-light); }
  .no-img svg { width:28px; height:28px; opacity:0.25; }
  .no-img span { font-size:9px; letter-spacing:0.15em; text-transform:uppercase; opacity:0.35; }
  .card-body { padding:12px 12px 18px; }
  .card-cod { font-size:9px; letter-spacing:0.2em; color:var(--gold); text-transform:uppercase; margin-bottom:4px; font-weight:500; }
  .card-name { font-family:'Cormorant Garamond',serif; font-size:14px; font-weight:400; line-height:1.3; margin-bottom:10px; cursor:pointer; }
  .card:not(.agotado) .card-name:hover { color:var(--gold-dark); }
  .card.agotado .card-name { cursor:pointer; }
  .card-footer { display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .card-price { font-size:12px; font-weight:500; }
  .card-price.consultar { font-size:9px; letter-spacing:0.12em; color:var(--text-light); text-transform:uppercase; }
  .card-material { font-size:8px; letter-spacing:0.1em; color:var(--text-light); text-transform:uppercase; background:var(--warm-white); padding:3px 7px; border:1px solid var(--border); flex-shrink:0; }
  .card-ask { display:block; width:100%; background:var(--charcoal); color:#fff; font-family:'Montserrat',sans-serif; font-size:9px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; text-align:center; padding:9px; text-decoration:none; margin-top:8px; transition:all 0.2s ease; border:1px solid var(--charcoal); }
  .card-ask:hover { background:var(--gold); border-color:var(--gold); color:var(--charcoal); }
  .card-ask.disabled { background:#ccc; border-color:#ccc; color:#fff; pointer-events:none; cursor:default; }
  .card-cart-btn { display:flex; align-items:center; justify-content:center; gap:7px; width:100%; background:#fff; color:var(--charcoal); font-family:'Montserrat',sans-serif; font-size:9px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; padding:9px; margin-top:14px; border:1px solid var(--charcoal); cursor:pointer; transition:all 0.2s ease; }
  .card-cart-btn:hover { background:var(--gold-light); border-color:var(--gold); }
  .card-cart-btn.added { background:var(--gold); border-color:var(--gold); color:#fff; }
  /* CTA agotado (tarjeta) */
  .agotado-cta { display:flex; align-items:center; justify-content:center; gap:7px; width:100%; background:transparent; color:var(--gold-dark); font-family:'Montserrat',sans-serif; font-size:9px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; text-align:center; padding:9px; text-decoration:none; margin-top:8px; border:1px solid var(--gold); cursor:pointer; transition:all 0.2s ease; }
  .agotado-cta:hover { background:var(--gold); color:#fff; }
  .empty { grid-column:1/-1; text-align:center; padding:60px 0; color:var(--text-light); font-family:'Cormorant Garamond',serif; font-style:italic; font-size:18px; }

  /* ── MODAL ── */
  .modal-overlay {
    display:none; position:fixed; inset:0; z-index:1000;
    background:rgba(20,18,15,0.85); backdrop-filter:blur(4px);
    align-items:center; justify-content:center; padding:16px;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--card-bg); width:100%; max-width:480px;
    max-height:92vh; overflow-y:auto; position:relative;
    display:flex; flex-direction:column;
    animation:modalIn 0.25s ease;
  }
  @keyframes modalIn { from{ opacity:0; transform:translateY(20px); } to{ opacity:1; transform:translateY(0); } }
  .modal.agotado-modal { opacity:0.9; }

  .modal-close {
    position:absolute; top:12px; right:12px; z-index:10;
    background:rgba(28,26,23,0.6); border:none; border-radius:50%;
    width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:#fff; transition:background 0.2s;
  }
  .modal-close:hover { background:var(--charcoal); }
  .modal-close svg { width:16px; height:16px; }

  .modal-img-wrap {
    width:100%; aspect-ratio:1; overflow:hidden;
    background:#F0EDE8; position:relative; cursor:zoom-in;
    touch-action:none;
  }
  .modal-img-wrap.zoomed { cursor:zoom-out; }
  .modal-img {
    width:100%; height:100%; object-fit:cover;
    display:block; transform-origin:center center;
    transition:transform 0.2s ease;
    pointer-events:none; user-select:none;
  }
  /* Badge modal agotado */
  .modal-badge-agotado {
    display:none; position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:rgba(28,26,23,0.72); color:#fff;
    font-family:'Montserrat',sans-serif; font-size:11px;
    font-weight:600; letter-spacing:0.25em; text-transform:uppercase;
    padding:10px 20px; white-space:nowrap;
  }

  .modal-zoom-bar {
    display:flex; align-items:center; gap:10px;
    padding:10px 16px; border-bottom:1px solid var(--border);
    background:var(--warm-white);
  }
  .modal-zoom-bar span { font-size:9px; letter-spacing:0.15em; color:var(--text-light); text-transform:uppercase; flex:1; }
  .zoom-btn {
    background:none; border:1px solid var(--border); color:var(--charcoal);
    width:28px; height:28px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:16px; transition:all 0.15s; flex-shrink:0;
  }
  .zoom-btn:hover { background:var(--gold); border-color:var(--gold); color:#fff; }
  .zoom-level { font-size:10px; font-weight:500; color:var(--charcoal); min-width:36px; text-align:center; }

  .modal-info { padding:20px 20px 24px; }
  .modal-cod { font-size:9px; letter-spacing:0.2em; color:var(--gold); text-transform:uppercase; margin-bottom:6px; font-weight:500; }
  .modal-name { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; line-height:1.2; margin-bottom:16px; }
  .modal-meta { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .modal-price { font-size:20px; font-weight:500; color:var(--charcoal); }
  .modal-price.consultar { font-size:12px; letter-spacing:0.15em; color:var(--text-light); text-transform:uppercase; }
  .modal-material { font-size:9px; letter-spacing:0.12em; color:var(--text-light); text-transform:uppercase; background:var(--warm-white); padding:4px 10px; border:1px solid var(--border); }
  .modal-wa {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; background:var(--charcoal); color:#fff;
    font-family:'Montserrat',sans-serif; font-size:10px; font-weight:500;
    letter-spacing:0.22em; text-transform:uppercase; padding:14px;
    text-decoration:none; border:1px solid var(--charcoal);
    transition:all 0.25s ease;
  }
  .modal-wa:hover { background:var(--gold); border-color:var(--gold); color:var(--charcoal); }
  .modal-wa svg { width:16px; height:16px; flex-shrink:0; }
  .modal-wa.disabled { background:#ccc; border-color:#ccc; pointer-events:none; }


  /* ── CARRITO ── */
  .cart-fab {
    position:fixed;bottom:22px;right:18px;z-index:500;
    background:var(--charcoal);color:#fff;
    border:none;border-radius:50%;width:54px;height:54px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.22);
    transition:background 0.2s,transform 0.15s;
  }
  .cart-fab:hover{background:var(--gold);transform:scale(1.07);}
  /* Fix 2: micro-animación al agregar al carrito */
  @keyframes cartBounce {
    0%   { transform:scale(1); box-shadow:0 4px 18px rgba(0,0,0,.22); }
    35%  { transform:scale(1.2); background:var(--gold); box-shadow:0 0 0 7px var(--gold-light), 0 4px 18px rgba(0,0,0,.22); }
    70%  { transform:scale(0.94); }
    100% { transform:scale(1); box-shadow:0 4px 18px rgba(0,0,0,.22); }
  }
  .cart-fab.bounce { animation:cartBounce 0.32s ease; }
  .cart-fab svg{width:22px;height:22px;}
  .cart-badge{
    position:absolute;top:-4px;right:-4px;
    background:var(--gold);color:var(--charcoal);
    font-size:10px;font-weight:700;width:19px;height:19px;
    border-radius:50%;display:none;align-items:center;justify-content:center;
  }
  .cart-overlay{
    display:none;position:fixed;inset:0;z-index:600;
    background:rgba(20,18,15,.6);backdrop-filter:blur(3px);
  }
  .cart-overlay.open{display:block;}
  .cart-panel{
    position:fixed;top:0;right:0;bottom:0;z-index:700;
    width:min(380px,100vw);background:var(--card-bg);
    border-left:1px solid var(--border);display:flex;flex-direction:column;
    transform:translateX(110%);transition:transform 0.3s cubic-bezier(.4,0,.2,1);
    box-shadow:-8px 0 32px rgba(0,0,0,.12);
  }
  .cart-panel.open{transform:translateX(0);}
  .cart-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 20px;border-bottom:1px solid var(--border);
  }
  .cart-header h2{
    font-family:'Cormorant Garamond',serif;font-size:20px;
    font-weight:400;letter-spacing:.05em;
  }
  .cart-close{background:none;border:none;cursor:pointer;color:var(--charcoal);padding:4px;display:flex;}
  .cart-close svg{width:20px;height:20px;}
  .cart-items{flex:1;overflow-y:auto;padding:16px 20px;}
  .cart-empty{
    text-align:center;font-family:'Cormorant Garamond',serif;
    font-style:italic;color:var(--text-light);font-size:16px;margin-top:40px;
  }
  .cart-item{
    display:grid;grid-template-columns:52px 1fr auto;
    gap:12px;align-items:center;
    padding:12px 0;border-bottom:1px solid var(--border);
  }
  .cart-item-img{width:52px;height:52px;object-fit:cover;background:#F0EDE8;}
  .cart-item-name{
    font-family:'Cormorant Garamond',serif;font-size:14px;
    font-weight:400;line-height:1.3;margin-bottom:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .cart-item-price{font-size:11px;color:var(--text-light);letter-spacing:.05em;}
  .cart-item-cod{font-size:9px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;}
  .cart-qty{display:flex;align-items:flex-end;flex-direction:column;gap:4px;}
  .qty-controls{display:flex;align-items:center;gap:4px;}
  .qty-btn{
    width:22px;height:22px;border:1px solid var(--border);
    background:none;cursor:pointer;font-size:14px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    color:var(--charcoal);transition:all 0.15s;
    position:relative;touch-action:manipulation;
  }
  /* Fix 4: área de toque ampliada (>=40x40) sin alterar el tamaño visual */
  .qty-btn::after{ content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; }
  .qty-btn:hover{background:var(--gold);border-color:var(--gold);color:#fff;}
  .qty-num{font-size:12px;font-weight:500;min-width:16px;text-align:center;}
  .cart-remove{
    background:none;border:none;cursor:pointer;color:var(--text-light);
    font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    padding:0;transition:color 0.15s;
  }
  .cart-remove:hover{color:#c0392b;}
  .cart-footer{padding:16px 20px;border-top:1px solid var(--border);background:var(--warm-white);}
  .cart-total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
  .cart-total-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-light);}
  .cart-total-val{font-family:'Cormorant Garamond',serif;font-size:20px;}
  .cart-wa-btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;background:var(--charcoal);color:#fff;
    font-family:'Montserrat',sans-serif;font-size:10px;font-weight:500;
    letter-spacing:.22em;text-transform:uppercase;padding:14px;
    border:1px solid var(--charcoal);transition:all .25s;cursor:pointer;
  }
  .cart-wa-btn:hover{background:var(--gold);border-color:var(--gold);color:var(--charcoal);}
  .cart-wa-btn svg{width:16px;height:16px;flex-shrink:0;}
  .cart-count-note{font-size:9px;color:var(--text-light);text-align:center;margin-top:8px;letter-spacing:.1em;}

  .modal-add-cart {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; background:#fff; color:var(--charcoal);
    font-family:'Montserrat',sans-serif; font-size:10px; font-weight:500;
    letter-spacing:0.22em; text-transform:uppercase; padding:14px;
    border:1px solid var(--charcoal); transition:all 0.25s ease;
    cursor:pointer; margin-bottom:8px;
  }
  .modal-add-cart svg { width:16px; height:16px; flex-shrink:0; }
  .modal-add-cart:hover { background:var(--gold-light); border-color:var(--gold); color:var(--charcoal); }
  .modal-add-cart.added { background:var(--gold); border-color:var(--gold); color:#fff; }
  /* CTA agotado (modal) */
  .modal-agotado-cta { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; background:transparent; color:var(--gold-dark); font-family:'Montserrat',sans-serif; font-size:10px; font-weight:500; letter-spacing:0.22em; text-transform:uppercase; padding:14px; border:1px solid var(--gold); text-decoration:none; cursor:pointer; transition:all 0.25s ease; }
  .modal-agotado-cta:hover { background:var(--gold); color:#fff; }
  .modal-agotado-cta svg { width:16px; height:16px; flex-shrink:0; }

  /* FOOTER */
  footer { text-align:center; padding:28px 24px; background:var(--charcoal); color:var(--text-light); font-size:10px; letter-spacing:0.18em; }
  footer a { color:var(--gold); text-decoration:none; }
</style>

const modalImg = document.getElementById("modal-img");
const modalImgWrap = document.getElementById("modal-img-wrap");
const modalBadge = document.getElementById("modal-badge-agotado");
const modalWa = document.getElementById("modal-wa");
const modalAgotadoCta = document.getElementById("modal-agotado-cta");
const zoomLevel = document.getElementById("zoom-level");

function setScale(s, instant) {
  currentScale = Math.min(4, Math.max(1, s));
  if (currentScale <= 1) { imgOffsetX = 0; imgOffsetY = 0; }
  modalImg.style.transition = instant ? 'none' : 'transform 0.2s ease';
  modalImg.style.transform = `scale(${currentScale}) translate(${imgOffsetX / currentScale}px, ${imgOffsetY / currentScale}px)`;
  zoomLevel.textContent = currentScale.toFixed(1).replace('.0','') + '×';
  modalImgWrap.classList.toggle("zoomed", currentScale > 1);
}

function resetZoom() { currentScale = 1; imgOffsetX = 0; imgOffsetY = 0; setScale(1); }

function openModal(idx) {
  const p = products[idx];
  modalImg.src = p.img || '';
  document.getElementById("modal-cod").textContent = p.cod;
  document.getElementById("modal-name").textContent = p.nombre;
  const priceEl = document.getElementById("modal-price");
  priceEl.textContent = p.precio;
  priceEl.className = 'modal-price' + (p.precio === 'Consultar' ? ' consultar' : '');
  document.getElementById("modal-material").textContent = p.material;
  const addBtn = document.getElementById('modal-add-cart-btn');
  if (!p.disponible) {
    // Estado agotado: badge visible, sin compra, CTA de consulta
    modalBadge.style.display = 'block';
    modalBox.classList.add('agotado-modal');
    modalWa.style.display = 'none';
    addBtn.style.display = 'none';
    modalAgotadoCta.style.display = 'flex';
    modalAgotadoCta.href = whatsappAgotadoLink(p.nombre, p.cod);
  } else {
    // Estado disponible
    modalBadge.style.display = 'none';
    modalBox.classList.remove('agotado-modal');
    modalAgotadoCta.style.display = 'none';
    modalWa.style.display = 'flex';
    modalWa.classList.remove('disabled');
    modalWa.href = whatsappLink(p.nombre, p.precio, p.cod);
    addBtn.style.display = 'flex';
    // Fix 6: reflejar si ya está en el carrito
    const inCart = cart.some(i => i.idx === idx);
    addBtn.classList.toggle('added', inCart);
    addBtn.innerHTML = MODAL_CART_SVG + (inCart ? ' Ya en tu carrito — agregar otro' : ' Agregar al carrito');
  }
  modalImgWrap.style.cursor = 'zoom-in';
  resetZoom();
  modal.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  modal.classList.remove("open");
  document.body.style.overflow = "";
  resetZoom();
}

document.getElementById("modal-close").onclick = closeModal;
modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

document.getElementById("zoom-in").onclick = () => setScale(currentScale + 0.5);
document.getElementById("zoom-out").onclick = () => setScale(currentScale - 0.5);
document.getElementById("zoom-reset").onclick = resetZoom;

modalImgWrap.addEventListener("click", e => {
  if (isDragging) return;
  setScale(currentScale > 1 ? 1 : 2.5);
});

modalImgWrap.addEventListener("mousedown", e => {
  if (currentScale <= 1) return;
  isDragging = false;
  dragStartX = e.clientX - imgOffsetX;
  dragStartY = e.clientY - imgOffsetY;
  modalImgWrap.style.cursor = "grabbing";
  const onMove = ev => {
    isDragging = true;
    imgOffsetX = ev.clientX - dragStartX;
    imgOffsetY = ev.clientY - dragStartY;
    setScale(currentScale, true);
  };
  const onUp = () => {
    modalImgWrap.style.cursor = currentScale > 1 ? "zoom-out" : "zoom-in";
    window.removeEventListener("mousemove", onMove);
    window.removeEventListener("mouseup", onUp);
    setTimeout(() => { isDragging = false; }, 50);
  };
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
});

modalImgWrap.addEventListener("touchstart", e => {
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    pinchStartScale = currentScale;
    e.preventDefault();
  } else if (e.touches.length === 1 && currentScale > 1) {
    dragStartX = e.touches[0].clientX - imgOffsetX;
    dragStartY = e.touches[0].clientY - imgOffsetY;
  }
}, { passive: false });

modalImgWrap.addEventListener("touchmove", e => {
  if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    setScale(pinchStartScale * (dist / lastTouchDist), true);
    e.preventDefault();
  } else if (e.touches.length === 1 && currentScale > 1) {
    imgOffsetX = e.touches[0].clientX - dragStartX;
    imgOffsetY = e.touches[0].clientY - dragStartY;
    setScale(currentScale, true);
    e.preventDefault();
  }
}, { passive: false });

modalImgWrap.addEventListener("touchend", e => {
  lastTouchDist = null;
  const now = Date.now();
  if (now - (modalImgWrap._lastTap||0) < 300) setScale(currentScale > 1 ? 1 : 2.5);
  modalImgWrap._lastTap = now;
});


/* ── CARRITO ── */
let cart = []; // [{idx, nombre, cod, precio, img, qty}]

function cartTotal() { return cart.reduce((s,i) => s + i.qty, 0); }

function updateCartUI() {
  const total = cartTotal();
  const badge = document.getElementById('cart-badge');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
  const footer = document.getElementById('cart-footer');
  const itemsEl = document.getElementById('cart-items');
  const countEl = document.getElementById('cart-total-count');
  const noteEl  = document.getElementById('cart-count-note');
  if (total === 0) {
    itemsEl.innerHTML = '<p class="cart-empty">Tu carrito está vacío.<br>Agregá piezas desde el catálogo.</p>';
    footer.style.display = 'none';
  } else {
    footer.style.display = 'block';
    countEl.textContent = total + ' ' + (total === 1 ? 'pieza' : 'piezas');
    noteEl.textContent = 'Se enviará un mensaje con todos los productos seleccionados';
    itemsEl.innerHTML = cart.map((item, ci) => `
      <div class="cart-item">
        ${item.img ? `<img class="cart-item-img" src="${item.img}" alt="${item.nombre}" loading="lazy">` : '<div class="cart-item-img"></div>'}
        <div class="cart-item-info">
          <p class="cart-item-cod">${item.cod}</p>
          <p class="cart-item-name">${item.nombre}</p>
          <p class="cart-item-price">${item.precio}</p>
        </div>
        <div class="cart-qty">
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${ci},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${ci},1)">+</button>
          </div>
          <button class="cart-remove" onclick="removeFromCart(${ci})">quitar</button>
        </div>
      </div>`).join('');
  }
  // Sync card cart buttons
  products.forEach((p, idx) => {
    const btn = document.getElementById('ccb-' + idx);
    if (!btn) return;
    const inCart = cart.some(i => i.idx === idx);
    btn.classList.toggle('added', inCart);
    btn.innerHTML = inCart
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> En carrito ✓'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="13" height="13"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> Agregar al carrito';
  });
  // Fix 1: persistir carrito (o limpiar si quedó vacío)
  try {
    if (cart.length) localStorage.setItem('oropella_cart', JSON.stringify(cart));
    else localStorage.removeItem('oropella_cart');
  } catch (e) {}
}

function addToCart(idx) {
  const p = products[idx];
  const existing = cart.find(i => i.idx === idx);
  if (existing) { existing.qty++; }
  else { cart.push({ idx, nombre: p.nombre, cod: p.cod, precio: p.precio, img: p.img, qty: 1 }); }
  updateCartUI();
  // Fix 2: micro-animación de feedback en el FAB
  const fab = document.getElementById('cart-fab');
  if (fab) {
    fab.classList.remove('bounce');
    void fab.offsetWidth; // reinicia la animación
    fab.classList.add('bounce');
    setTimeout(() => fab.classList.remove('bounce'), 340);
  }
}

function addToCartFromModal() {
  const src = modalImg.src;
  const cod  = document.getElementById('modal-cod').textContent;
  const p = products.find(pr => pr.cod === cod);
  if (!p) return;
  const idx = products.indexOf(p);
  addToCart(idx);
  const btn = document.getElementById('modal-add-cart-btn');
  btn.textContent = '✓ Agregado';
  btn.classList.add('added');
  setTimeout(() => {
    btn.innerHTML = MODAL_CART_SVG + ' Ya en tu carrito — agregar otro';
    btn.classList.add('added');
  }, 1800);
}

function changeQty(ci, delta) {
  cart[ci].qty += delta;
  if (cart[ci].qty <= 0) cart.splice(ci, 1);
  updateCartUI();
}

function removeFromCart(ci) {
  cart.splice(ci, 1);
  updateCartUI();
}

function openCart() {
  document.getElementById('cart-panel').classList.add('open');
  document.getElementById('cart-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cart-panel').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function sendCartWA() {
  if (!cart.length) return;
  let msg = 'Hola! Vi el catálogo de Oropella y me interesan estas piezas:\n\n';
  cart.forEach(item => {
    msg += `• ${item.cod} – ${item.nombre} (${item.precio})`;
    if (item.qty > 1) msg += ` x${item.qty}`;
    msg += '\n';
  });
  msg += '\n¿Me podés dar más información? 💛';
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
}

// Fix 1: restaurar carrito desde localStorage (validando índices contra products)
(function restoreCart() {
  try {
    const saved = localStorage.getItem('oropella_cart');
    if (!saved) return;
    const parsed = JSON.parse(saved);
    if (!Array.isArray(parsed)) return;
    cart = parsed
      .filter(it => it && Number.isInteger(it.idx) && products[it.idx])
      .map(it => {
        const p = products[it.idx];
        const qty = Math.max(1, parseInt(it.qty, 10) || 1);
        // Re-sincronizar datos desde products por si cambiaron
        return { idx: it.idx, nombre: p.nombre, cod: p.cod, precio: p.precio, img: p.img, qty };
      });
  } catch (e) { cart = []; }
})();

renderGrid();
updateCartUI();
updateFilterCounts();
</script>
